spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: classgo-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/classgo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    access-token-expiration: PT1H
    refresh-token-expiration: P7D
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  google:
    enabled: ${GOOGLE_AUTH_ENABLED:false}
    client-id: ${GOOGLE_CLIENT_ID:}
  storage:
    public-base-url: ${R2_PUBLIC_BASE_URL:https://cdn.classgo.app}
    bucket: ${R2_BUCKET:classgo-assets}
  notifications:
    email-enabled: ${EMAIL_ENABLED:false}
  aws:
    region: ${AWS_REGION:us-east-1}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    ses:
      from-email: ${AWS_SES_FROM_EMAIL:no-reply@classgo.app}
    r2:
      endpoint: ${R2_ENDPOINT:}

logging:
  level:
    com.classgo.backend: ${LOG_LEVEL_CLASSGO_BACKEND:INFO}
